<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c63d6"/>
      <stop offset="100%" stop-color="#3f2a7a"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ddd6fe" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cffafe" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="128" height="128" rx="24" fill="none" stroke="#f5f3ff" stroke-opacity="0.5" stroke-width="2"/>

  <!-- Bar chart in the background (bottom area) -->
  <rect x="22" y="78" width="10" height="26" rx="3" fill="url(#bar1)" opacity="0.5"/>
  <rect x="38" y="64" width="10" height="40" rx="3" fill="url(#bar2)" opacity="0.5"/>
  <rect x="54" y="72" width="10" height="32" rx="3" fill="url(#bar1)" opacity="0.5"/>
  <rect x="70" y="56" width="10" height="48" rx="3" fill="url(#bar2)" opacity="0.5"/>
  <rect x="86" y="68" width="10" height="36" rx="3" fill="url(#bar1)" opacity="0.5"/>

  <!-- Activity / heartbeat line -->
  <polyline
    points="16,62 30,62 38,62 44,52 50,38 56,28 60,50 64,62 70,62 76,56 80,44 84,56 90,62 100,62 112,62"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Glow effect on the pulse line -->
  <polyline
    points="16,62 30,62 38,62 44,52 50,38 56,28 60,50 64,62 70,62 76,56 80,44 84,56 90,62 100,62 112,62"
    fill="none"
    stroke="#8b5cf6"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.28"
  />
</svg>
